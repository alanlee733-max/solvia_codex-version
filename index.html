  <script>
    const COMPANY_STORAGE_KEY = 'alan-crm-companies';
    const TASK_STORAGE_KEY = 'alan-crm-tasks';
    const UI_STATE_STORAGE_KEY = 'alan-crm-ui-state';
    const BUSINESS_FIELDS = ['Aesthetics', 'Bio/OEM', 'AI/Software', 'Trade', 'Other'];
    const BUYER_TYPES = ['Distributor', 'Clinic', 'Manufacturer', 'Agency', 'Vendor', 'Other'];
    const STATUS_OPTIONS = ['New', 'Contacted', 'Qualified', 'Active', 'Dormant', 'Archived'];
    const PRIORITY_OPTIONS = ['A', 'B', 'C'];
    const TASK_TYPE_OPTIONS = ['Email', 'Call', 'Quote', 'Sample', 'Meeting', 'Follow-up', 'Document', 'Other'];
    const TASK_STATUS_OPTIONS = ['Open', 'Done', 'Cancelled'];
    const ALLOWED_VIEWS = ['overview', 'partners', 'deals', 'tasks', 'activity', 'documents'];
    const ALLOWED_COMPANY_SAVED_VIEWS = ['all', 'needsAction', 'priority', 'pausedLeads', 'fieldAesthetics', 'fieldBioOem', 'fieldAiSoftware', 'fieldTrade', 'fieldOther'];

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getNowIso() {
      return new Date().toISOString();
    }

    function normalizeCompanyRecord(record) {
      const timestamp = getNowIso();
      const normalized = {
        ...record,
        id: record?.id ?? Date.now() + Math.floor(Math.random() * 1000),
        companyName: String(record?.companyName || '').trim(),
        buyerName: String(record?.buyerName || '').trim(),
        email: String(record?.email || '').trim(),
        website: String(record?.website || '').trim(),
        country: String(record?.country || '').trim(),
        productCategory: String(record?.productCategory || record?.handledProducts || '').trim(),
        notes: String(record?.notes || '').trim(),
        businessField: BUSINESS_FIELDS.includes(record?.businessField) ? record.businessField : 'Aesthetics',
        buyerType: BUYER_TYPES.includes(record?.buyerType) ? record.buyerType : 'Distributor',
        status: STATUS_OPTIONS.includes(record?.status) ? record.status : 'New',
        priority: PRIORITY_OPTIONS.includes(record?.priority) ? record.priority : 'B',
        nextActionDate: String(record?.nextActionDate || '').trim(),
        tags: String(record?.tags || '').trim(),
        createdAt: record?.createdAt || timestamp,
        updatedAt: record?.updatedAt || record?.createdAt || timestamp
      };

      return normalized;
    }

    function loadCompaniesFromStorage() {
      try {
        const raw = localStorage.getItem(COMPANY_STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        const migrated = parsed.map((company) => normalizeCompanyRecord(company));
        const isDifferent = JSON.stringify(parsed) !== JSON.stringify(migrated);
        if (isDifferent) {
          saveCompaniesToStorage(migrated);
        }
        return migrated;
      } catch (error) {
        return [];
      }
    }

    function saveCompaniesToStorage(companies) {
      localStorage.setItem(COMPANY_STORAGE_KEY, JSON.stringify(companies));
    }

    function normalizeTaskRecord(task) {
      const timestamp = getNowIso();
      return {
        ...task,
        id: task?.id ?? Date.now() + Math.floor(Math.random() * 1000),
        title: String(task?.title || '').trim(),
        companyId: String(task?.companyId || '').trim(),
        dueDate: String(task?.dueDate || '').trim(),
        type: TASK_TYPE_OPTIONS.includes(task?.type) ? task.type : 'Follow-up',
        status: TASK_STATUS_OPTIONS.includes(task?.status) ? task.status : 'Open',
        priority: PRIORITY_OPTIONS.includes(task?.priority) ? task.priority : 'B',
        notes: String(task?.notes || '').trim(),
        createdAt: task?.createdAt || timestamp,
        updatedAt: task?.updatedAt || task?.createdAt || timestamp
      };
    }

    function loadTasksFromStorage() {
      try {
        const raw = localStorage.getItem(TASK_STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        const normalized = parsed.map((task) => normalizeTaskRecord(task));
        if (JSON.stringify(parsed) !== JSON.stringify(normalized)) {
          saveTasksToStorage(normalized);
        }
        return normalized;
      } catch (error) {
        return [];
      }
    }

    function saveTasksToStorage(tasks) {
      localStorage.setItem(TASK_STORAGE_KEY, JSON.stringify(tasks));
    }

    function loadUiStateFromStorage() {
      const now = new Date();
      const defaultState = {
        currentView: 'overview',
        companySavedView: 'all',
        calendarYear: now.getFullYear(),
        calendarMonthIndex: now.getMonth()
      };

      try {
        const raw = localStorage.getItem(UI_STATE_STORAGE_KEY);
        if (!raw) return defaultState;
        const parsed = JSON.parse(raw);
        const currentView = ALLOWED_VIEWS.includes(parsed?.currentView) ? parsed.currentView : defaultState.currentView;
        const companySavedView = ALLOWED_COMPANY_SAVED_VIEWS.includes(parsed?.companySavedView) ? parsed.companySavedView : defaultState.companySavedView;
        const calendarYear = Number.isInteger(parsed?.calendarYear) ? parsed.calendarYear : defaultState.calendarYear;
        const calendarMonthIndex = Number.isInteger(parsed?.calendarMonthIndex) && parsed.calendarMonthIndex >= 0 && parsed.calendarMonthIndex <= 11
          ? parsed.calendarMonthIndex
          : defaultState.calendarMonthIndex;

        return {
          currentView,
          companySavedView,
          calendarYear,
          calendarMonthIndex
        };
      } catch (error) {
        return defaultState;
      }
    }

    function saveUiStateToStorage() {
      const uiState = {
        currentView: appState.currentView,
        companySavedView: appState.companySavedView,
        calendarYear: appState.calendarYear,
        calendarMonthIndex: appState.calendarMonthIndex
      };
      localStorage.setItem(UI_STATE_STORAGE_KEY, JSON.stringify(uiState));
    }

    let companiesData = loadCompaniesFromStorage();
    let tasksData = loadTasksFromStorage();
    const restoredUiState = loadUiStateFromStorage();

    const appState = {
      currentView: restoredUiState.currentView,
      partnerSearch: '',
      partnerSort: 'updatedAtDesc',
      companySavedView: restoredUiState.companySavedView,
      companyFormOpen: false,
      taskFormOpen: false,
      calendarYear: restoredUiState.calendarYear,
      calendarMonthIndex: restoredUiState.calendarMonthIndex,
      taskFormMode: 'add',
      editingTaskId: null,
      selectedCalendarActionId: null,
      companyFormMode: 'add',
      editingCompanyId: null
    };

    const viewMeta = {
      overview: { title: 'Overview', subtitle: 'Command Center / Snapshot' },
      partners: { title: 'Company Partners', subtitle: 'Company / Partner directory' },
      deals: { title: 'Deals Pipeline', subtitle: 'Pipeline / Active deals' },
      tasks: { title: 'Action Calendar', subtitle: 'Tasks / Company next actions' },
      activity: { title: 'Activity Feed', subtitle: 'Activity / Recent touchpoints' },
      documents: { title: 'Documents', subtitle: 'Reports / Files and templates' }
    };

    function getTodayLocalDateStart() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function parseInputDateLocal(dateText) {
      if (!dateText) return null;
      const [year, month, day] = String(dateText).split('-').map(Number);
      if (!year || !month || !day) return null;
      return new Date(year, month - 1, day);
    }

    function isNeedsAction(company) {
      if (company.status === 'Archived' || company.status === 'Dormant') return false;
      const targetDate = parseInputDateLocal(company.nextActionDate);
      if (!targetDate) return false;
      return targetDate <= getTodayLocalDateStart();
    }

    function applySavedViewFilter(companies) {
      switch (appState.companySavedView) {
        case 'needsAction':
          return companies.filter((company) => isNeedsAction(company));
        case 'priority':
          return companies.filter((company) => company.priority === 'A');
        case 'pausedLeads':
          return companies.filter((company) => company.status === 'Dormant');
        case 'fieldAesthetics':
          return companies.filter((company) => company.businessField === 'Aesthetics');
        case 'fieldBioOem':
          return companies.filter((company) => company.businessField === 'Bio/OEM');
        case 'fieldAiSoftware':
          return companies.filter((company) => company.businessField === 'AI/Software');
        case 'fieldTrade':
          return companies.filter((company) => company.businessField === 'Trade');
        case 'fieldOther':
          return companies.filter((company) => company.businessField === 'Other');
        default:
          return companies;
      }
    }

    function getFilteredCompanies() {
      return applySavedViewFilter(companiesData).filter((partner) => {
        const searchTerm = appState.partnerSearch.toLowerCase().trim();
        const companyName = String(partner.companyName || '').toLowerCase();
        const buyerName = String(partner.buyerName || '').toLowerCase();
        const country = String(partner.country || '').toLowerCase();
        const email = String(partner.email || '').toLowerCase();
        const website = String(partner.website || '').toLowerCase();
        const productCategory = String(partner.productCategory || '').toLowerCase();
        const notes = String(partner.notes || '').toLowerCase();
        const businessField = String(partner.businessField || '').toLowerCase();
        const buyerType = String(partner.buyerType || '').toLowerCase();
        const status = String(partner.status || '').toLowerCase();
        const priority = String(partner.priority || '').toLowerCase();
        const tags = String(partner.tags || '').toLowerCase();
        return !searchTerm
          || companyName.includes(searchTerm)
          || buyerName.includes(searchTerm)
          || country.includes(searchTerm)
          || email.includes(searchTerm)
          || website.includes(searchTerm)
          || productCategory.includes(searchTerm)
          || notes.includes(searchTerm)
          || businessField.includes(searchTerm)
          || buyerType.includes(searchTerm)
          || status.includes(searchTerm)
          || priority.includes(searchTerm)
          || tags.includes(searchTerm);
      });
    }

    function sortCompanies(companies) {
      const sorted = [...companies];
      sorted.sort((a, b) => {
        if (appState.partnerSort === 'companyNameAsc') {
          return String(a.companyName || '').localeCompare(String(b.companyName || ''));
        }
        if (appState.partnerSort === 'companyNameDesc') {
          return String(b.companyName || '').localeCompare(String(a.companyName || ''));
        }
        if (appState.partnerSort === 'updatedAtOldest') {
          return new Date(a.updatedAt || a.createdAt || 0) - new Date(b.updatedAt || b.createdAt || 0);
        }
        return new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0);
      });
      return sorted;
    }

    function getCompanyIdentityKey(companyName, email) {
      return `${String(companyName || '').trim().toLowerCase()}::${String(email || '').trim().toLowerCase()}`;
    }

    function getTaskById(taskId) {
      return tasksData.find((task) => String(task.id) === String(taskId)) || null;
    }

    function getCompanyById(companyId) {
      return companiesData.find((company) => String(company.id) === String(companyId)) || null;
    }

    function formatDateKey(dateObj) {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function getCalendarActions() {
      const companyItems = companiesData
        .filter((company) => !!parseInputDateLocal(company.nextActionDate))
        .map((company) => ({
          id: `company-${company.id}`,
          sourceType: 'companyNextAction',
          source: 'company',
          dueDate: company.nextActionDate,
          title: `${company.companyName || 'Company'} follow-up`,
          companyId: String(company.id || ''),
          companyName: company.companyName || '',
          type: 'Follow-up',
          priority: company.priority || 'B',
          status: company.status || 'Open',
          notes: company.notes || ''
        }));

      const taskItems = tasksData
        .filter((task) => !!parseInputDateLocal(task.dueDate))
        .map((task) => {
          const linkedCompany = getCompanyById(task.companyId);
          return {
            id: `task-${task.id}`,
            sourceType: 'task',
            source: 'task',
            dueDate: task.dueDate,
            title: task.title || 'Untitled task',
            companyId: String(task.companyId || ''),
            companyName: linkedCompany?.companyName || '',
            type: task.type || 'Follow-up',
            priority: task.priority || 'B',
            status: task.status || 'Open',
            notes: task.notes || ''
          };
        });

      return [...companyItems, ...taskItems];
    }

    function getSelectedCalendarAction() {
      if (!appState.selectedCalendarActionId) return null;
      return getCalendarActions().find((item) => String(item.id) === String(appState.selectedCalendarActionId)) || null;
    }

    function getTaskGroups() {
      const today = getTodayLocalDateStart();
      const actions = getCalendarActions();
      const todayItems = [];
      const overdueItems = [];
      const upcomingItems = [];

      actions.forEach((item) => {
        const actionDate = parseInputDateLocal(item.dueDate);
        if (!actionDate) return;
        if (actionDate.getTime() === today.getTime()) {
          todayItems.push(item);
        } else if (actionDate < today) {
          const includeOverdue = item.source === 'task'
            ? item.status !== 'Done' && item.status !== 'Cancelled'
            : item.status !== 'Archived' && item.status !== 'Dormant';
          if (includeOverdue) overdueItems.push(item);
        } else if (actionDate > today) {
          upcomingItems.push(item);
        }
      });

      const byDate = actions.reduce((acc, item) => {
        const key = String(item.dueDate || '');
        if (!acc[key]) acc[key] = [];
        acc[key].push(item);
        return acc;
      }, {});

      return { actions, todayItems, overdueItems, upcomingItems, byDate };
    }

    function isOpenTaskStatus(status) {
      return status !== 'Done' && status !== 'Cancelled';
    }

    function isActiveCompanyStatus(status) {
      return status !== 'Archived' && status !== 'Dormant';
    }

    function getOpenTaskCount() {
      return tasksData.filter((task) => isOpenTaskStatus(task.status)).length;
    }

    function getOverviewOverdueCount() {
      const today = getTodayLocalDateStart();
      return getCalendarActions().filter((item) => {
        const actionDate = parseInputDateLocal(item.dueDate);
        if (!actionDate || actionDate >= today) return false;
        return item.source === 'task'
          ? isOpenTaskStatus(item.status)
          : isActiveCompanyStatus(item.status);
      }).length;
    }

    function getPriorityFocusCount() {
      const taskPriorityA = tasksData.filter((task) => task.priority === 'A' && isOpenTaskStatus(task.status)).length;
      const companyPriorityA = companiesData.filter((company) => company.priority === 'A').length;
      return taskPriorityA + companyPriorityA;
    }

    function getWeeklyFocusItems() {
      const today = getTodayLocalDateStart();
      const next7 = new Date(today);
      next7.setDate(next7.getDate() + 7);

      const ranked = getCalendarActions()
        .map((item) => {
          const actionDate = parseInputDateLocal(item.dueDate);
          if (!actionDate) return null;
          const isActive = item.source === 'task'
            ? isOpenTaskStatus(item.status)
            : isActiveCompanyStatus(item.status);
          if (!isActive) return null;

          let rank = null;
          if (actionDate < today) rank = 0;
          else if (actionDate.getTime() === today.getTime()) rank = 1;
          else if (item.priority === 'A') rank = 2;
          else if (actionDate <= next7) rank = 3;
          else return null;

          return { ...item, rank, actionDate };
        })
        .filter(Boolean)
        .sort((a, b) => {
          if (a.rank !== b.rank) return a.rank - b.rank;
          return a.actionDate - b.actionDate;
        });

      return ranked.slice(0, 5);
    }

    function renderCalendarDayCell(year, monthIndex, day, byDate) {
      const dateKey = formatDateKey(new Date(year, monthIndex, day));
      const dayItems = byDate[dateKey] || [];
      const visible = dayItems.slice(0, 3);
      const remainingCount = Math.max(dayItems.length - visible.length, 0);

      return `
        <div class="min-h-[110px] border border-slate-100 rounded-lg p-2">
          <p class="text-xs font-semibold text-slate-500">${day}</p>
          <div class="mt-1 space-y-1">
            ${visible.map((item) => `
              <button type="button" aria-pressed="${String(appState.selectedCalendarActionId) === String(item.id) ? 'true' : 'false'}" data-action="select-calendar-action" data-action-id="${escapeHtml(item.id)}" data-source="${escapeHtml(item.source)}" class="w-full text-left text-[11px] rounded px-1.5 py-1 border border-transparent transition-colors cursor-pointer ${String(appState.selectedCalendarActionId) === String(item.id) ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-slate-50 hover:bg-blue-50 hover:border-blue-200'}">
                <p class="font-medium text-slate-700 truncate">${escapeHtml(item.title || '-')}</p>
                <p class="text-slate-500">P${escapeHtml(item.priority || '-')} · ${escapeHtml(item.status || '-')}</p>
                ${item.source === 'task' && item.companyName ? `<p class="text-slate-400 truncate">${escapeHtml(item.companyName)}</p>` : ''}

            `).join('')}
            ${remainingCount ? `<p class="text-[11px] text-slate-400">+${remainingCount} more</p>` : ''}
          </div>
        </div>
      `;
    }

    function renderTaskActionListSection(title, items, emptyMessage) {
      if (!items.length) {
        return `<div><p class="text-sm font-semibold text-slate-700 mb-2">${title}</p><p class="text-xs text-slate-400">${emptyMessage}</p></div>`;
      }

      return `
        <div>
          <p class="text-sm font-semibold text-slate-700 mb-2">${title}</p>
          <ul class="space-y-2">
            ${items.slice(0, 8).map((item) => `
              <li class="border border-slate-100 rounded-md px-2 py-1 text-xs">
                <p class="font-medium text-slate-700">${escapeHtml(item.title || '-')}</p>
                <p class="text-slate-500">${escapeHtml(item.dueDate || '-')} · Priority ${escapeHtml(item.priority || '-')} · ${escapeHtml(item.status || '-')}</p>
                ${item.companyName ? `<p class="text-slate-400">${escapeHtml(item.companyName)}</p>` : ''}
                ${item.source === 'task' ? `
                  <div class="mt-1 flex gap-1">
                    <button type="button" data-action="edit-task" data-task-id="${escapeHtml(item.id.replace('task-', ''))}" class="px-2 py-0.5 border border-slate-200 rounded text-[11px] text-slate-600 hover:bg-slate-50">Edit</button>
                    <button type="button" data-action="delete-task" data-task-id="${escapeHtml(item.id.replace('task-', ''))}" class="px-2 py-0.5 border border-red-200 rounded text-[11px] text-red-600 hover:bg-red-50">Delete</button>
                  </div>
                ` : ''}
              </li>
            `).join('')}
          </ul>
        </div>
      `;
    }

    function renderTasksView() {
      const { actions, todayItems, overdueItems, upcomingItems, byDate } = getTaskGroups();
      const editingTask = tasksData.find((task) => String(task.id) === String(appState.editingTaskId));
      const selectedAction = getSelectedCalendarAction();
      const year = appState.calendarYear;
      const monthIndex = appState.calendarMonthIndex;
      const monthStart = new Date(year, monthIndex, 1);
      const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
      const leadingBlanks = monthStart.getDay();
      const monthName = monthStart.toLocaleString('en-US', { month: 'long' });

      const calendarCells = [];
      for (let i = 0; i < leadingBlanks; i += 1) {
        calendarCells.push('<div class="min-h-[110px] border border-transparent"></div>');
      }
      for (let day = 1; day <= daysInMonth; day += 1) {
        calendarCells.push(renderCalendarDayCell(year, monthIndex, day, byDate));
      }

      const monthSummary = Array.from({ length: 12 }, (_, i) => {
        const currentMonth = new Date(year, i, 1);
        const nextMonth = new Date(year, i + 1, 1);
        const monthItems = actions.filter((item) => {
          const d = parseInputDateLocal(item.dueDate);
          return d && d >= currentMonth && d < nextMonth;
        });
        const monthOverdue = monthItems.filter((item) => {
          const d = parseInputDateLocal(item.dueDate);
          if (!d || d >= getTodayLocalDateStart()) return false;
          return item.source === 'task'
            ? item.status !== 'Done' && item.status !== 'Cancelled'
            : item.status !== 'Archived' && item.status !== 'Dormant';
        }).length;
        const monthPriority = monthItems.filter((item) => item.priority === 'A').length;

        return `
          <div class="border border-slate-100 rounded-lg p-3 bg-white">
            <p class="text-sm font-semibold text-slate-700">${currentMonth.toLocaleString('en-US', { month: 'short' })}</p>
            <p class="text-xs text-slate-500 mt-1">Actions: ${monthItems.length}</p>
            <p class="text-xs text-slate-500">Overdue: ${monthOverdue}</p>
            <p class="text-xs text-slate-500">Priority: ${monthPriority}</p>
          </div>
        `;
      }).join('');

      return `
        <div class="space-y-6">
          <div><h1 class="text-2xl font-bold text-slate-800">Action Calendar</h1><p class="text-sm text-slate-400 mt-1">Tasks / Company next actions</p></div>

          <div class="bg-white rounded-xl p-4 custom-shadow border border-slate-100">
            <div class="flex items-center justify-between mb-3">
              <p class="text-sm font-semibold text-slate-700">Task Actions</p>
                  <button id="openTaskFormBtn" class="px-3 py-2 rounded-md bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700">Add Task</button>
                </div>
            ${appState.taskFormOpen ? `
              <form id="taskForm" class="space-y-3">
                <p id="taskFormError" class="hidden text-sm text-red-600"></p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                  <input name="title" type="text" value="${escapeHtml(editingTask?.title || '')}" placeholder="Task Title *" class="w-full border border-slate-200 rounded-md text-sm" required />
                  <select name="companyId" class="w-full border border-slate-200 rounded-md text-sm">
                    <option value="">No linked company</option>
                    ${companiesData.map((company) => `<option value="${escapeHtml(company.id)}" ${String(editingTask?.companyId || '') === String(company.id) ? 'selected' : ''}>${escapeHtml(company.companyName || 'Unnamed company')}</option>`).join('')}

    function renderCurrentView() {
      const viewRoot = document.getElementById('viewRoot');
      const template = viewTemplates[appState.currentView] || viewTemplates.overview;
      viewRoot.innerHTML = template();
      updateHeaderContext();
      updateSidebarActiveState();
      if (appState.currentView === 'partners') {
        setupPartnersViewInteractions();
      }
      if (appState.currentView === 'tasks') {
        setupTasksViewInteractions();
      }
    }

    function updateHeaderContext() {
      const meta = viewMeta[appState.currentView] || viewMeta.overview;
      document.getElementById('headerTitle').textContent = meta.title;
      document.getElementById('headerSubtitle').textContent = meta.subtitle;
    }

    function updateSidebarActiveState() {
      const items = document.querySelectorAll('.sidebar-item');
      items.forEach((item) => {
        const isActive = item.dataset.view === appState.currentView;
        item.classList.toggle('bg-[#e0ebff]', isActive);
        item.classList.toggle('text-blue-700', isActive);
        item.classList.toggle('font-semibold', isActive);
        item.classList.toggle('text-slate-600', !isActive);
        item.classList.toggle('font-medium', !isActive);
      });
      updateCompanySavedViewActiveState();
    }

    function setupViewRouter() {
      document.getElementById('sidebarNav').addEventListener('click', (event) => {
        const savedViewButton = event.target.closest('[data-company-view]');
        if (savedViewButton) {
          appState.currentView = 'partners';
          appState.companySavedView = savedViewButton.dataset.companyView;
          saveUiStateToStorage();
          renderCurrentView();
          return;
        }

        const button = event.target.closest('[data-view]');
        if (!button) return;
        if (button.dataset.view === 'partners') {
          appState.companySavedView = 'all';
        }
        appState.currentView = button.dataset.view;
        saveUiStateToStorage();
        renderCurrentView();
      });
    }

    function setupPartnersViewInteractions() {
      const searchInput = document.getElementById('partnerSearchInput');
      const openFormButton = document.getElementById('openCompanyFormBtn');
      const companyForm = document.getElementById('companyForm');
      const cancelFormButton = document.getElementById('cancelCompanyFormBtn');
      const sortSelect = document.getElementById('partnerSortSelect');
      const tableBody = document.getElementById('partnersTableBody');

      if (searchInput) {
        searchInput.addEventListener('input', (event) => {
          appState.partnerSearch = event.target.value;
          renderPartnersTableRows();
        });
      }

      if (sortSelect) {
        sortSelect.addEventListener('change', (event) => {
          appState.partnerSort = event.target.value;
          renderPartnersTableRows();
        });
      }

      if (openFormButton) {
        openFormButton.addEventListener('click', () => {
          appState.companyFormOpen = true;
          appState.companyFormMode = 'add';
          appState.editingCompanyId = null;
          renderCurrentView();
        });
      }

      if (cancelFormButton) {
        cancelFormButton.addEventListener('click', () => {
          appState.companyFormOpen = false;
          appState.companyFormMode = 'add';
          appState.editingCompanyId = null;
          renderCurrentView();
        });
      }

      if (tableBody) {
        tableBody.addEventListener('click', (event) => {
          const actionButton = event.target.closest('[data-action]');
          if (!actionButton) return;
          const companyId = actionButton.dataset.id;
          if (actionButton.dataset.action === 'edit-company') {
            appState.companyFormOpen = true;
            appState.companyFormMode = 'edit';
            appState.editingCompanyId = companyId;
            renderCurrentView();
            return;
          }

          if (actionButton.dataset.action === 'delete-company') {
            const company = companiesData.find((item) => String(item.id) === String(companyId));
            if (!company) return;
            const shouldDelete = window.confirm(`Delete ${company.companyName || 'this company'}?`);
            if (!shouldDelete) return;
            companiesData = companiesData.filter((item) => String(item.id) !== String(companyId));
            saveCompaniesToStorage(companiesData);
            if (String(appState.editingCompanyId) === String(companyId)) {
              appState.companyFormOpen = false;
              appState.companyFormMode = 'add';
              appState.editingCompanyId = null;
            }
            renderCurrentView();
          }
        });
      }

      if (companyForm) {
        companyForm.addEventListener('submit', (event) => {
          event.preventDefault();
          const formData = new FormData(companyForm);
          const companyName = String(formData.get('companyName') || '').trim();
          const buyerName = String(formData.get('buyerName') || '').trim();
          const email = String(formData.get('email') || '').trim();
          const website = String(formData.get('website') || '').trim();
          const country = String(formData.get('country') || '').trim();
          const productCategory = String(formData.get('productCategory') || '').trim();
          const notes = String(formData.get('notes') || '').trim();
          const businessField = String(formData.get('businessField') || 'Aesthetics').trim();
          const buyerType = String(formData.get('buyerType') || 'Distributor').trim();
          const status = String(formData.get('status') || 'New').trim();
          const priority = String(formData.get('priority') || 'B').trim();
          const nextActionDate = String(formData.get('nextActionDate') || '').trim();
          const tags = String(formData.get('tags') || '').trim();
          const errorNode = document.getElementById('companyFormError');

          if (!companyName) {
            errorNode.textContent = 'Company Name is required.';
            errorNode.classList.remove('hidden');
            return;
          }

          if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            errorNode.textContent = 'Please enter a valid email format.';
            errorNode.classList.remove('hidden');
            return;
          }
          errorNode.classList.add('hidden');

          const duplicateKey = getCompanyIdentityKey(companyName, email);
          const existingDuplicate = companiesData.find((company) => {
            const currentKey = getCompanyIdentityKey(company.companyName, company.email);
            const isSameRecord = appState.companyFormMode === 'edit' && String(company.id) === String(appState.editingCompanyId);
            return !isSameRecord && currentKey === duplicateKey && duplicateKey !== '::';
          });

          if (existingDuplicate) {
            errorNode.textContent = 'A company with the same name and email already exists.';
            errorNode.classList.remove('hidden');
            return;
          }

          const timestamp = getNowIso();
          if (appState.companyFormMode === 'edit') {
            companiesData = companiesData.map((company) => {
              if (String(company.id) !== String(appState.editingCompanyId)) return company;
              return normalizeCompanyRecord({
                ...company,
                companyName,
                buyerName,
                email,
                website,
                country,
                productCategory,
                notes,
                businessField,
                buyerType,
                status,
                priority,
                nextActionDate,
                tags,
                updatedAt: timestamp
              });
            });
          } else {
            companiesData = [
              normalizeCompanyRecord({
                id: Date.now(),
                companyName,
                buyerName,
                email,
                website,
                country,
                productCategory,
                notes,
                businessField,
                buyerType,
                status,
                priority,
                nextActionDate,
                tags,
                createdAt: timestamp,
                updatedAt: timestamp
              }),
              ...companiesData
            ];
          }

          saveCompaniesToStorage(companiesData);
          appState.companyFormOpen = false;
          appState.companyFormMode = 'add';
          appState.editingCompanyId = null;
          renderCurrentView();
        });
      }
    }

    function setupTasksViewInteractions() {
      const openTaskFormBtn = document.getElementById('openTaskFormBtn');
      const cancelTaskFormBtn = document.getElementById('cancelTaskFormBtn');
      const taskForm = document.getElementById('taskForm');
      const tasksActionArea = document.getElementById('tasksActionArea');

      if (openTaskFormBtn) {
        openTaskFormBtn.addEventListener('click', () => {
          appState.taskFormOpen = true;
          appState.taskFormMode = 'add';
          appState.editingTaskId = null;
          appState.selectedCalendarActionId = null;
          renderCurrentView();
        });
      }

      if (cancelTaskFormBtn) {
        cancelTaskFormBtn.addEventListener('click', () => {
          appState.taskFormOpen = false;
          appState.taskFormMode = 'add';
          appState.editingTaskId = null;
          appState.selectedCalendarActionId = null;
          renderCurrentView();
        });
      }

      function startTaskEdit(taskId) {
        appState.taskFormOpen = true;
        appState.taskFormMode = 'edit';
        appState.editingTaskId = taskId;
        appState.selectedCalendarActionId = `task-${taskId}`;
        renderCurrentView();
      }

      function deleteTaskById(taskId) {
        const targetTask = getTaskById(taskId);
        if (!targetTask) return;
        const shouldDelete = window.confirm(`Delete task "${targetTask.title || 'Untitled'}"?`);
        if (!shouldDelete) return;
        tasksData = tasksData.filter((task) => String(task.id) !== String(taskId));
        saveTasksToStorage(tasksData);
        if (String(appState.editingTaskId) === String(taskId)) {
          appState.taskFormOpen = false;
          appState.taskFormMode = 'add';
          appState.editingTaskId = null;
        }
        if (String(appState.selectedCalendarActionId) === String(`task-${taskId}`)) {
          appState.selectedCalendarActionId = null;
        }
        renderCurrentView();
      }

      if (tasksActionArea) {
        tasksActionArea.addEventListener('click', (event) => {
          const actionButton = event.target.closest('[data-action]');
          if (!actionButton) return;
          if (actionButton.dataset.action === 'prev-calendar-month') {
            if (appState.calendarMonthIndex === 0) {
              appState.calendarMonthIndex = 11;
              appState.calendarYear -= 1;
            } else {
              appState.calendarMonthIndex -= 1;
            }
            saveUiStateToStorage();
            renderCurrentView();
            return;
          }
          if (actionButton.dataset.action === 'next-calendar-month') {
            if (appState.calendarMonthIndex === 11) {
              appState.calendarMonthIndex = 0;
              appState.calendarYear += 1;
            } else {
              appState.calendarMonthIndex += 1;
            }
            saveUiStateToStorage();
            renderCurrentView();
            return;
          }
          if (actionButton.dataset.action === 'today-calendar-month') {
            const today = new Date();
            appState.calendarYear = today.getFullYear();
            appState.calendarMonthIndex = today.getMonth();
            saveUiStateToStorage();
            renderCurrentView();
            return;
          }
          if (actionButton.dataset.action === 'select-calendar-action') {
            appState.selectedCalendarActionId = actionButton.dataset.actionId;
            renderCurrentView();
            return;
          }
          if (actionButton.dataset.action === 'edit-task') {
            startTaskEdit(actionButton.dataset.taskId);
            return;
          }
          if (actionButton.dataset.action === 'delete-task') {
            deleteTaskById(actionButton.dataset.taskId);
          }
        });
      }

      if (taskForm) {
        taskForm.addEventListener('submit', (event) => {
          event.preventDefault();
          const formData = new FormData(taskForm);
          const title = String(formData.get('title') || '').trim();
          const dueDate = String(formData.get('dueDate') || '').trim();
          const companyId = String(formData.get('companyId') || '').trim();
          const type = String(formData.get('type') || 'Follow-up').trim();
          const status = String(formData.get('status') || 'Open').trim();
          const priority = String(formData.get('priority') || 'B').trim();
          const notes = String(formData.get('notes') || '').trim();
          const errorNode = document.getElementById('taskFormError');

          if (!title || !dueDate) {
            errorNode.textContent = 'Title and Due Date are required.';
            errorNode.classList.remove('hidden');
            return;
          }

          errorNode.classList.add('hidden');
          const timestamp = getNowIso();
          if (appState.taskFormMode === 'edit' && appState.editingTaskId) {
            tasksData = tasksData.map((task) => {
              if (String(task.id) !== String(appState.editingTaskId)) return task;
              return normalizeTaskRecord({
                ...task,
                title,
                companyId,
                dueDate,
                type,
                status,
                priority,
                notes,
                updatedAt: timestamp
              });
            });
          } else {
            tasksData = [
              normalizeTaskRecord({
                id: Date.now(),
                title,
                companyId,
                dueDate,
                type,
                status,
                priority,
                notes,
                createdAt: timestamp,
                updatedAt: timestamp
              }),
              ...tasksData
            ];
          }

          saveTasksToStorage(tasksData);
          appState.taskFormOpen = false;
          appState.selectedCalendarActionId = appState.taskFormMode === 'edit' && appState.editingTaskId
            ? `task-${appState.editingTaskId}`
            : appState.selectedCalendarActionId;
          appState.taskFormMode = 'add';
          appState.editingTaskId = null;
          renderCurrentView();
        });
      }
    }

    function setupDraftingPanel() {
      const openBtn = document.getElementById('openDraftingTableBtn');
      const closeBtn = document.getElementById('closeDraftingTableBtn');
      const cancelBtn = document.getElementById('cancelDraftingBtn');
      const panel = document.getElementById('draftingPanel');
      const backdrop = document.getElementById('draftingBackdrop');
      const tabs = document.querySelectorAll('.draft-tab');
      const typeLabel = document.getElementById('draftTypeLabel');

      function openDraftingTable() {
        panel.classList.remove('translate-x-full');
        backdrop.classList.remove('hidden');
      }

      function closeDraftingTable() {
        panel.classList.add('translate-x-full');
        backdrop.classList.add('hidden');
      }

      openBtn.addEventListener('click', openDraftingTable);
      closeBtn.addEventListener('click', closeDraftingTable);
      cancelBtn.addEventListener('click', closeDraftingTable);
      backdrop.addEventListener('click', closeDraftingTable);

      tabs.forEach((tab) => {
        tab.addEventListener('click', () => {
          tabs.forEach((btn) => {
            btn.classList.remove('bg-blue-600', 'text-white');
            btn.classList.add('bg-slate-100', 'text-slate-600');
          });

          tab.classList.remove('bg-slate-100', 'text-slate-600');
          tab.classList.add('bg-blue-600', 'text-white');

          const map = {
            note: 'Writing: Note',
            task: 'Writing: Task',
            call: 'Writing: Call Log',
            follow: 'Writing: Follow-up'
          };

          typeLabel.textContent = map[tab.dataset.type] || 'Writing: Note';
        });
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      setupViewRouter();
      setupDraftingPanel();
      renderCurrentView();
    });
  </script>
</body>
</html>
