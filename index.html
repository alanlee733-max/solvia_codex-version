  <div id="draftingBackdrop" class="fixed inset-0 bg-slate-900/20 hidden"></div>

        <button class="draft-tab px-2 py-2 rounded-md bg-slate-100 text-slate-600" data-type="task">Task</button>

      <input type="text" class="w-full border border-slate-200 rounded-md text-sm" placeholder="Title" />

      <div class="flex justify-end gap-2">
        <button id="cancelDraftingBtn" class="px-3 py-2 rounded-md border border-slate-200 text-sm text-slate-600 hover:bg-slate-50">Cancel</button>
        <button class="px-3 py-2 rounded-md bg-blue-600 text-white text-sm hover:bg-blue-700">Save Draft</button>
      </div>
    </div>

  <script>
    const COMPANY_STORAGE_KEY = 'alan-crm-companies';

    function getNowIso() {
      return new Date().toISOString();
    }

    function normalizeCompanyRecord(record) {
      const timestamp = getNowIso();
      const normalized = {
        ...record,
        id: record?.id ?? Date.now() + Math.floor(Math.random() * 1000),
        companyName: String(record?.companyName || '').trim(),
        buyerName: String(record?.buyerName || '').trim(),
        email: String(record?.email || '').trim(),
        website: String(record?.website || '').trim(),
        country: String(record?.country || '').trim(),
        productCategory: String(record?.productCategory || record?.handledProducts || '').trim(),
        notes: String(record?.notes || '').trim(),
        createdAt: record?.createdAt || timestamp,
        updatedAt: record?.updatedAt || record?.createdAt || timestamp
      };

      return normalized;
    }

    function loadCompaniesFromStorage() {
      try {
        const raw = localStorage.getItem(COMPANY_STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        const migrated = parsed.map((company) => normalizeCompanyRecord(company));
        const isDifferent = JSON.stringify(parsed) !== JSON.stringify(migrated);
        if (isDifferent) {
          saveCompaniesToStorage(migrated);
        }
        return migrated;
      } catch (error) {
        return [];
      }
    }

    function saveCompaniesToStorage(companies) {
      localStorage.setItem(COMPANY_STORAGE_KEY, JSON.stringify(companies));
    }

    let companiesData = loadCompaniesFromStorage();

    const appState = {
      currentView: 'partners',
      partnerSearch: '',
      partnerSort: 'updatedAtDesc',
      companyFormOpen: false,
      companyFormMode: 'add',
      editingCompanyId: null
    };

    const viewMeta = {
      overview: { title: 'Overview', subtitle: 'Command Center / Snapshot' },
      partners: { title: 'Company Partners', subtitle: 'Company / Partner directory' },
      deals: { title: 'Deals Pipeline', subtitle: 'Pipeline / Active deals' },
      tasks: { title: 'Task Board', subtitle: 'Tasks / Weekly execution' },
      activity: { title: 'Activity Feed', subtitle: 'Activity / Recent touchpoints' },
      documents: { title: 'Documents', subtitle: 'Reports / Files and templates' }
    };

    function getFilteredCompanies() {
      return companiesData.filter((partner) => {
        const searchTerm = appState.partnerSearch.toLowerCase().trim();
        const companyName = String(partner.companyName || '').toLowerCase();
        const buyerName = String(partner.buyerName || '').toLowerCase();
        const country = String(partner.country || '').toLowerCase();
        const email = String(partner.email || '').toLowerCase();
        const website = String(partner.website || '').toLowerCase();
        const productCategory = String(partner.productCategory || '').toLowerCase();
        const notes = String(partner.notes || '').toLowerCase();
        return !searchTerm
          || companyName.includes(searchTerm)
          || buyerName.includes(searchTerm)
          || country.includes(searchTerm)
          || email.includes(searchTerm)
          || website.includes(searchTerm)
          || productCategory.includes(searchTerm)
          || notes.includes(searchTerm);
      });
    }

    function sortCompanies(companies) {
      const sorted = [...companies];
      sorted.sort((a, b) => {
        if (appState.partnerSort === 'companyNameAsc') {
          return String(a.companyName || '').localeCompare(String(b.companyName || ''));
        }
        if (appState.partnerSort === 'companyNameDesc') {
          return String(b.companyName || '').localeCompare(String(a.companyName || ''));
        }
        if (appState.partnerSort === 'updatedAtOldest') {
          return new Date(a.updatedAt || a.createdAt || 0) - new Date(b.updatedAt || b.createdAt || 0);
        }
        return new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0);
      });
      return sorted;
    }

    function getCompanyIdentityKey(companyName, email) {
      return `${String(companyName || '').trim().toLowerCase()}::${String(email || '').trim().toLowerCase()}`;
    }

    function renderPartnersView() {
      const filteredPartners = sortCompanies(getFilteredCompanies());
      const editingCompany = companiesData.find((company) => String(company.id) === String(appState.editingCompanyId));
      const formCompany = appState.companyFormMode === 'edit' && editingCompany ? editingCompany : {};
      const hasAnyData = companiesData.length > 0;
      const noData = !hasAnyData;

      return `
        <div class="space-y-6">
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white rounded-xl p-4 custom-shadow border border-slate-100"><p class="text-xs text-slate-500">Total Companies</p><p class="text-2xl font-bold text-slate-800 mt-1">${companiesData.length}</p></div>
            <div class="bg-white rounded-xl p-4 custom-shadow border border-slate-100"><p class="text-xs text-slate-500">Visible Rows</p><p class="text-2xl font-bold text-slate-800 mt-1">${filteredPartners.length}</p></div>
          </div>

          <div class="bg-white rounded-xl p-4 custom-shadow border border-slate-100 grid grid-cols-1 md:grid-cols-3 gap-3">
            <input id="partnerSearchInput" type="text" value="${appState.partnerSearch}" placeholder="Search company, country, contact..." class="w-full border border-slate-200 rounded-md text-sm" />
            <select id="partnerSortSelect" class="w-full border border-slate-200 rounded-md text-sm">
              <option value="updatedAtDesc" ${appState.partnerSort === 'updatedAtDesc' ? 'selected' : ''}>Updated: Newest</option>
              <option value="updatedAtOldest" ${appState.partnerSort === 'updatedAtOldest' ? 'selected' : ''}>Updated: Oldest</option>
              <option value="companyNameAsc" ${appState.partnerSort === 'companyNameAsc' ? 'selected' : ''}>Company: A → Z</option>
              <option value="companyNameDesc" ${appState.partnerSort === 'companyNameDesc' ? 'selected' : ''}>Company: Z → A</option>
            </select>
            <button id="openCompanyFormBtn" class="w-full md:w-auto justify-self-start bg-blue-600 text-white px-4 py-2 rounded-md text-sm font-semibold hover:bg-blue-700 transition-colors">Add Company</button>
          </div>

          ${appState.companyFormOpen ? `
            <form id="companyForm" class="bg-white rounded-xl p-4 custom-shadow border border-slate-100 space-y-4">
              <p id="companyFormError" class="hidden text-sm text-red-600"></p>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <input name="companyName" type="text" value="${formCompany.companyName || ''}" placeholder="Company Name *" class="w-full border border-slate-200 rounded-md text-sm" required />
                <input name="email" type="email" value="${formCompany.email || ''}" placeholder="Email" class="w-full border border-slate-200 rounded-md text-sm" />
                <input name="website" type="text" value="${formCompany.website || ''}" placeholder="Website" class="w-full border border-slate-200 rounded-md text-sm" />
                <input name="country" type="text" value="${formCompany.country || ''}" placeholder="Country" class="w-full border border-slate-200 rounded-md text-sm" />
                <input name="productCategory" type="text" value="${formCompany.productCategory || ''}" placeholder="Product Category" class="w-full border border-slate-200 rounded-md text-sm" />
                <input name="buyerName" type="text" value="${formCompany.buyerName || ''}" placeholder="Buyer Name (Optional)" class="w-full border border-slate-200 rounded-md text-sm" />
              </div>
              <textarea name="notes" placeholder="Notes" class="w-full border border-slate-200 rounded-md text-sm min-h-24">${formCompany.notes || ''}</textarea>
              <div class="flex gap-2 justify-end">
                <button id="cancelCompanyFormBtn" type="button" class="px-3 py-2 rounded-md border border-slate-200 text-sm text-slate-600 hover:bg-slate-50">Cancel</button>
                <button type="submit" class="px-3 py-2 rounded-md bg-blue-600 text-white text-sm hover:bg-blue-700">${appState.companyFormMode === 'edit' ? 'Save Changes' : 'Save'}</button>
              </div>
            </form>
          ` : ''}

          <div class="bg-white rounded-xl custom-shadow border border-slate-100 overflow-hidden">
              <table class="w-full text-sm">
                <thead class="bg-slate-50 text-slate-500">
                  <tr>
                    <th class="p-3 text-left">Company</th>
                    <th class="p-3 text-left">Buyer</th>
                    <th class="p-3 text-left">Email</th>
                    <th class="p-3 text-left">Website</th>
                    <th class="p-3 text-left">Country</th>
                    <th class="p-3 text-left">Product Category</th>
                    <th class="p-3 text-left">Actions</th>
                  </tr>
                </thead>
                <tbody id="partnersTableBody">
                  ${filteredPartners.length ? filteredPartners.map((partner) => `
                    <tr class="border-t hover:bg-slate-50">
                      <td class="p-3"><p class="font-medium text-slate-800">${partner.companyName || '-'}</p><p class="text-xs text-slate-500">${partner.notes || ''}</p></td>
                      <td class="p-3">${partner.buyerName || '-'}</td>
                      <td class="p-3">${partner.email || '-'}</td>
                      <td class="p-3">${partner.website || '-'}</td>
                      <td class="p-3">${partner.country || '-'}</td>
                      <td class="p-3">${partner.productCategory || '-'}</td>
                      <td class="p-3">
                        <div class="flex items-center gap-2">
                          <button type="button" data-action="edit-company" data-id="${partner.id}" class="px-2 py-1 text-xs rounded border border-slate-200 hover:bg-slate-100">Edit</button>
                          <button type="button" data-action="delete-company" data-id="${partner.id}" class="px-2 py-1 text-xs rounded border border-red-200 text-red-600 hover:bg-red-50">Delete</button>
                        </div>
                      </td>
                    </tr>
                  `).join('') : `<tr><td colspan="7" class="p-4 text-center text-slate-500">${noData ? 'No companies yet. Add your first company.' : 'No matching companies found. Try another search.'}</td></tr>`}
                </tbody>
              </table>
          </div>
        </div>
      `;
    }

    const viewTemplates = {
      overview: () => `
        <div class="space-y-6">
          <div>
            <h1 class="text-2xl font-bold text-slate-800">Overview</h1>
            <p class="text-sm text-slate-400 mt-1">Command Center / Snapshot</p>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            ${['Open Deals', 'Pending Tasks', 'Partners Active', 'Revenue MTD'].map((item, i) => `
              <div class="bg-white rounded-xl p-5 custom-shadow border border-slate-100">
                <p class="text-sm text-slate-500">${item}</p>
                <p class="text-2xl font-bold text-slate-800 mt-2">${['18', '7', '12', '$84K'][i]}</p>
              </div>
            `).join('')}
          </div>
          <div class="bg-white rounded-xl p-6 custom-shadow border border-slate-100">
            <h3 class="font-semibold text-slate-800 mb-3">Weekly Focus</h3>
            <ul class="text-sm text-slate-600 space-y-2 list-disc pl-5">
              <li>Finalize 2 distributor quotes for UAE and Thailand.</li>
              <li>Collect sample feedback from 3 partner clinics.</li>
              <li>Review regulatory document checklist for new market onboarding.</li>
            </ul>
          </div>
        </div>
      `,
      partners: () => renderPartnersView(),
      deals: () => `
        <div class="space-y-6">
          <div><h1 class="text-2xl font-bold text-slate-800">Deals Pipeline</h1><p class="text-sm text-slate-400 mt-1">Pipeline / Active deals</p></div>
          <div class="bg-white rounded-xl p-6 custom-shadow border border-slate-100">
            <div class="grid grid-cols-4 gap-4 text-sm">
              <div class="p-3 bg-slate-50 rounded-lg"><p class="text-slate-500">Lead</p><p class="text-xl font-semibold text-slate-800">9</p></div>
              <div class="p-3 bg-slate-50 rounded-lg"><p class="text-slate-500">Contacted</p><p class="text-xl font-semibold text-slate-800">6</p></div>
              <div class="p-3 bg-slate-50 rounded-lg"><p class="text-slate-500">Negotiation</p><p class="text-xl font-semibold text-slate-800">3</p></div>
              <div class="p-3 bg-slate-50 rounded-lg"><p class="text-slate-500">Won</p><p class="text-xl font-semibold text-slate-800">4</p></div>
            </div>
          </div>
          <div class="bg-white rounded-xl custom-shadow border border-slate-100 overflow-hidden">
            <table class="w-full text-sm"><thead class="bg-slate-50 text-slate-500"><tr><th class="p-3 text-left">Company</th><th class="p-3 text-left">Country</th><th class="p-3 text-left">Stage</th><th class="p-3 text-left">Value</th></tr></thead><tbody>
            <tr class="border-t"><td class="p-3">KL Wellness</td><td class="p-3">Malaysia</td><td class="p-3">Negotiation</td><td class="p-3">$42,000</td></tr>
            <tr class="border-t"><td class="p-3">Dubai Derma</td><td class="p-3">UAE</td><td class="p-3">Contacted</td><td class="p-3">$58,000</td></tr>
            <tr class="border-t"><td class="p-3">Bangkok Clinic</td><td class="p-3">Thailand</td><td class="p-3">Lead</td><td class="p-3">$21,000</td></tr>
            </tbody></table>
          </div>
        </div>
      `,
      tasks: () => `
        <div class="space-y-6">
          <div><h1 class="text-2xl font-bold text-slate-800">Task Board</h1><p class="text-sm text-slate-400 mt-1">Tasks / Weekly execution</p></div>
          <div class="grid md:grid-cols-3 gap-4">
            ${['Today','This Week','Waiting'].map((col, idx) => `
              <div class="bg-white rounded-xl p-5 custom-shadow border border-slate-100">
                <h3 class="font-semibold text-slate-800 mb-3">${col}</h3>
                <ul class="space-y-2 text-sm text-slate-700">
                  <li>• ${[['Send NDA to partner','Check RF sample status'],['Prepare quote revision','Finalize distributor terms'],['Await legal review','Await sample result']][idx][0]}</li>
                  <li>• ${[['Follow-up with KL','Update pipeline notes'],['Book demo call','Update pricing sheet'],['Await PO confirmation','Await customs docs']][idx][1]}</li>
                </ul>
              </div>
            `).join('')}
          </div>
        </div>
      `,
      activity: () => `
        <div class="space-y-6">
          <div><h1 class="text-2xl font-bold text-slate-800">Activity Feed</h1><p class="text-sm text-slate-400 mt-1">Activity / Recent touchpoints</p></div>
          <div class="bg-white rounded-xl p-6 custom-shadow border border-slate-100 space-y-4 text-sm">
            <div class="border-b pb-3">10:45 AM · Email sent to Acme Solutions about updated quotation.</div>
            <div class="border-b pb-3">09:20 AM · Follow-up call logged with Dubai Derma.</div>
            <div class="border-b pb-3">Yesterday · Sample shipment status updated to in transit.</div>
            <div>Yesterday · New partner note added for Thailand clinic network.</div>
          </div>
        </div>
      `,
      documents: () => `
        <div class="space-y-6">
          <div><h1 class="text-2xl font-bold text-slate-800">Documents</h1><p class="text-sm text-slate-400 mt-1">Reports / Files and templates</p></div>
          <div class="bg-white rounded-xl custom-shadow border border-slate-100 overflow-hidden">
            <table class="w-full text-sm"><thead class="bg-slate-50"><tr><th class="p-3 text-left">Name</th><th class="p-3 text-left">Type</th><th class="p-3 text-left">Updated</th><th class="p-3 text-left">Owner</th></tr></thead><tbody>
              <tr class="border-t"><td class="p-3">Distributor Agreement v4</td><td class="p-3">PDF</td><td class="p-3">2026-04-21</td><td class="p-3">Jane</td></tr>
              <tr class="border-t"><td class="p-3">Pricing Sheet APAC</td><td class="p-3">XLSX</td><td class="p-3">2026-04-20</td><td class="p-3">Jane</td></tr>
              <tr class="border-t"><td class="p-3">Sample Request Form</td><td class="p-3">DOCX</td><td class="p-3">2026-04-18</td><td class="p-3">Ops</td></tr>
            </tbody></table>
          </div>
        </div>
      `
    };

    function renderCurrentView() {
      const viewRoot = document.getElementById('viewRoot');
      const template = viewTemplates[appState.currentView] || viewTemplates.overview;
      viewRoot.innerHTML = template();
      updateHeaderContext();
      updateSidebarActiveState();
      if (appState.currentView === 'partners') {
        setupPartnersViewInteractions();
      }
    }

    function updateHeaderContext() {
      const meta = viewMeta[appState.currentView] || viewMeta.overview;
      document.getElementById('headerTitle').textContent = meta.title;
      document.getElementById('headerSubtitle').textContent = meta.subtitle;
    }

    function updateSidebarActiveState() {
      const items = document.querySelectorAll('.sidebar-item');
      items.forEach((item) => {
        const isActive = item.dataset.view === appState.currentView;
        item.classList.toggle('bg-[#e0ebff]', isActive);
        item.classList.toggle('text-blue-700', isActive);
        item.classList.toggle('font-semibold', isActive);
        item.classList.toggle('text-slate-600', !isActive);
        item.classList.toggle('font-medium', !isActive);
      });
    }

    function setupViewRouter() {
      document.getElementById('sidebarNav').addEventListener('click', (event) => {
        const button = event.target.closest('[data-view]');
        if (!button) return;
        appState.currentView = button.dataset.view;
        renderCurrentView();
      });
    }

    function setupPartnersViewInteractions() {
      const searchInput = document.getElementById('partnerSearchInput');
      const openFormButton = document.getElementById('openCompanyFormBtn');
      const companyForm = document.getElementById('companyForm');
      const cancelFormButton = document.getElementById('cancelCompanyFormBtn');
      const sortSelect = document.getElementById('partnerSortSelect');
      const tableBody = document.getElementById('partnersTableBody');

      if (searchInput) {
        searchInput.addEventListener('input', (event) => {
          appState.partnerSearch = event.target.value;
          renderCurrentView();
        });
      }

      if (sortSelect) {
        sortSelect.addEventListener('change', (event) => {
          appState.partnerSort = event.target.value;
          renderCurrentView();
        });
      }

      if (openFormButton) {
        openFormButton.addEventListener('click', () => {
          appState.companyFormOpen = true;
          appState.companyFormMode = 'add';
          appState.editingCompanyId = null;
          renderCurrentView();
        });
      }

      if (cancelFormButton) {
        cancelFormButton.addEventListener('click', () => {
          appState.companyFormOpen = false;
          appState.companyFormMode = 'add';
          appState.editingCompanyId = null;
          renderCurrentView();
        });
      }

      if (tableBody) {
        tableBody.addEventListener('click', (event) => {
          const actionButton = event.target.closest('[data-action]');
          if (!actionButton) return;
          const companyId = actionButton.dataset.id;
          if (actionButton.dataset.action === 'edit-company') {
            appState.companyFormOpen = true;
            appState.companyFormMode = 'edit';
            appState.editingCompanyId = companyId;
            renderCurrentView();
            return;
          }

          if (actionButton.dataset.action === 'delete-company') {
            const company = companiesData.find((item) => String(item.id) === String(companyId));
            if (!company) return;
            const shouldDelete = window.confirm(`Delete ${company.companyName || 'this company'}?`);
            if (!shouldDelete) return;
            companiesData = companiesData.filter((item) => String(item.id) !== String(companyId));
            saveCompaniesToStorage(companiesData);
            if (String(appState.editingCompanyId) === String(companyId)) {
              appState.companyFormOpen = false;
              appState.companyFormMode = 'add';
              appState.editingCompanyId = null;
            }
            renderCurrentView();
          }
        });
      }

      if (companyForm) {
        companyForm.addEventListener('submit', (event) => {
          event.preventDefault();
          const formData = new FormData(companyForm);
          const companyName = String(formData.get('companyName') || '').trim();
          const buyerName = String(formData.get('buyerName') || '').trim();
          const email = String(formData.get('email') || '').trim();
          const website = String(formData.get('website') || '').trim();
          const country = String(formData.get('country') || '').trim();
          const productCategory = String(formData.get('productCategory') || '').trim();
          const notes = String(formData.get('notes') || '').trim();
          const errorNode = document.getElementById('companyFormError');

          if (!companyName) {
            errorNode.textContent = 'Company Name is required.';
            errorNode.classList.remove('hidden');
            return;
          }

          if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            errorNode.textContent = 'Please enter a valid email format.';
            errorNode.classList.remove('hidden');
            return;
          }
          errorNode.classList.add('hidden');

          const duplicateKey = getCompanyIdentityKey(companyName, email);
          const existingDuplicate = companiesData.find((company) => {
            const currentKey = getCompanyIdentityKey(company.companyName, company.email);
            const isSameRecord = appState.companyFormMode === 'edit' && String(company.id) === String(appState.editingCompanyId);
            return !isSameRecord && currentKey === duplicateKey && duplicateKey !== '::';
          });

          if (existingDuplicate) {
            errorNode.textContent = 'A company with the same name and email already exists.';
            errorNode.classList.remove('hidden');
            return;
          }

          const timestamp = getNowIso();
          if (appState.companyFormMode === 'edit') {
            companiesData = companiesData.map((company) => {
              if (String(company.id) !== String(appState.editingCompanyId)) return company;
              return normalizeCompanyRecord({
                ...company,
                companyName,
                buyerName,
                email,
                website,
                country,
                productCategory,
                notes,
                updatedAt: timestamp
              });
            });
          } else {
            companiesData = [
              normalizeCompanyRecord({
                id: Date.now(),
                companyName,
                buyerName,
                email,
                website,
                country,
                productCategory,
                notes,
                createdAt: timestamp,
                updatedAt: timestamp
              }),
              ...companiesData
            ];
          }

          saveCompaniesToStorage(companiesData);
          appState.companyFormOpen = false;
          appState.companyFormMode = 'add';
          appState.editingCompanyId = null;
          renderCurrentView();
        });
      }
    }

    function setupDraftingPanel() {
      const openBtn = document.getElementById('openDraftingTableBtn');
      const closeBtn = document.getElementById('closeDraftingTableBtn');
      const cancelBtn = document.getElementById('cancelDraftingBtn');
      const panel = document.getElementById('draftingPanel');
      const backdrop = document.getElementById('draftingBackdrop');
      const tabs = document.querySelectorAll('.draft-tab');
      const typeLabel = document.getElementById('draftTypeLabel');

      function openDraftingTable() {
        panel.classList.remove('translate-x-full');
        backdrop.classList.remove('hidden');
      }

      function closeDraftingTable() {
        panel.classList.add('translate-x-full');
        backdrop.classList.add('hidden');
      }

      openBtn.addEventListener('click', openDraftingTable);
      closeBtn.addEventListener('click', closeDraftingTable);
      cancelBtn.addEventListener('click', closeDraftingTable);
      backdrop.addEventListener('click', closeDraftingTable);

      tabs.forEach((tab) => {
        tab.addEventListener('click', () => {
          tabs.forEach((btn) => {
            btn.classList.remove('bg-blue-600', 'text-white');
            btn.classList.add('bg-slate-100', 'text-slate-600');
          });

          tab.classList.remove('bg-slate-100', 'text-slate-600');
          tab.classList.add('bg-blue-600', 'text-white');

          const map = {
            note: 'Writing: Note',
            task: 'Writing: Task',
            call: 'Writing: Call Log',
            follow: 'Writing: Follow-up'
          };

          typeLabel.textContent = map[tab.dataset.type] || 'Writing: Note';
        });
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      setupViewRouter();
      setupDraftingPanel();
      renderCurrentView();
    });
  </script>
</body>
</html>
