  <script>
    const partnersData = [
      {
        id: 101,
        company: 'Acme Solutions Inc.',
        country: 'United States',
        contact: 'Jane Doe',
        email: 'jane@acmesolutions.com',
        website: 'www.acmesolutions.com',
        status: 'Active',
        priority: 'High',
        productFocus: ['Skin Booster', 'HA Filler'],
        lastContact: '2026-04-22',
        nextAction: 'Send revised distributor quote',
        overview: 'Key strategic partner handling premium dermatology clinics on the west coast.',
        orderHistory: ['Mar 2026 · $42,000', 'Feb 2026 · $36,000', 'Jan 2026 · $31,000'],
        contactLog: ['2026-04-22 · Pricing review call', '2026-04-18 · Follow-up email on samples'],
        samples: ['Skin Booster Batch SB-12 · Delivered', 'HA Filler Trial Pack · In transit'],
        notes: 'Prioritizes faster replenishment cycles and co-marketing support.'
      },
      {
        id: 102,
        company: 'Bangkok Derma Trade',
        country: 'Thailand',
        contact: 'Pim Rattanakorn',
        email: 'pim@bangkokderma.co.th',
        website: 'bangkokderma.co.th',
        status: 'Prospect',
        priority: 'Medium',
        productFocus: ['RF Device', 'Body Contouring'],
        lastContact: '2026-04-20',
        nextAction: 'Share market launch deck',
        overview: 'Potential growth partner targeting private hospital groups in Bangkok.',
        orderHistory: ['No confirmed orders yet'],
        contactLog: ['2026-04-20 · Introductory call', '2026-04-15 · Product catalog shared'],
        samples: ['RF Device brochure requested'],
        notes: 'Interested in a phased rollout starting with two flagship clinics.'
      },
      {
        id: 103,
        company: 'Dubai Aesthetics Hub',
        country: 'UAE',
        contact: 'Omar Al Fahim',
        email: 'omar@dubaiaestheticshub.ae',
        website: 'dubaiaestheticshub.ae',
        status: 'On Hold',
        priority: 'High',
        productFocus: ['Laser Device', 'HA Filler'],
        lastContact: '2026-04-19',
        nextAction: 'Resolve registration checklist',
        overview: 'Large-volume prospect currently paused pending regulatory approval.',
        orderHistory: ['Feb 2026 · $58,000 (device pre-order)'],
        contactLog: ['2026-04-19 · Compliance document review', '2026-04-10 · Legal scope alignment'],
        samples: ['Laser consumable kit · Pending customs'],
        notes: 'Can reopen quickly once registration documents are finalized.'
      },
      {
        id: 104,
        company: 'KL Wellness Distribution',
        country: 'Malaysia',
        contact: 'Nur Aisyah',
        email: 'nur@klwellness.my',
        website: 'klwellness.my',
        status: 'Active',
        priority: 'Low',
        productFocus: ['Skin Booster'],
        lastContact: '2026-04-21',
        nextAction: 'Book quarterly planning sync',
        overview: 'Reliable repeat-order partner serving mid-size medspas in Malaysia.',
        orderHistory: ['Mar 2026 · $19,000', 'Jan 2026 · $14,000'],
        contactLog: ['2026-04-21 · Order forecast alignment', '2026-04-12 · MOQ update sent'],
        samples: ['Skin Booster v2 leaflet shared'],
        notes: 'Stable performance, but lower urgency compared to other markets.'
      }
    ];

    const appState = {
      currentView: 'partners',
      selectedPartnerId: partnersData[0].id,
      activePartnerTab: 'overview',
      partnerSearch: '',
      partnerCountry: '',
      partnerStatus: ''
    };

    const viewMeta = {
      overview: { title: 'Overview', subtitle: 'Command Center / Snapshot' },
      partners: { title: 'Entity Dossier: Acme Solutions Inc.', subtitle: 'Entities / Acme Solutions Inc.' },
      deals: { title: 'Deals Pipeline', subtitle: 'Pipeline / Active deals' },
      tasks: { title: 'Task Board', subtitle: 'Tasks / Weekly execution' },
      activity: { title: 'Activity Feed', subtitle: 'Activity / Recent touchpoints' },
      documents: { title: 'Documents', subtitle: 'Reports / Files and templates' }
    };

    function getFilteredPartners() {
      return partnersData.filter((partner) => {
        const searchTerm = appState.partnerSearch.toLowerCase().trim();
        const matchesSearch = !searchTerm
          || partner.company.toLowerCase().includes(searchTerm)
          || partner.country.toLowerCase().includes(searchTerm)
          || partner.contact.toLowerCase().includes(searchTerm)
          || partner.email.toLowerCase().includes(searchTerm);
        const matchesCountry = !appState.partnerCountry || partner.country === appState.partnerCountry;
        const matchesStatus = !appState.partnerStatus || partner.status === appState.partnerStatus;
        return matchesSearch && matchesCountry && matchesStatus;
      });
    }

    function ensureSelectedPartner(filteredPartners) {
      if (!filteredPartners.length) return null;
      const stillVisible = filteredPartners.some((partner) => partner.id === appState.selectedPartnerId);
      if (!stillVisible) {
        appState.selectedPartnerId = filteredPartners[0].id;
      }
      return filteredPartners.find((partner) => partner.id === appState.selectedPartnerId) || filteredPartners[0];
    }

    function renderPartnerDetailBody(partner) {
      if (!partner) {
        return '<p class="text-sm text-slate-500">No partner matches current filters.</p>';
      }

      if (appState.activePartnerTab === 'orders') {
        return `<ul class="space-y-2 text-sm text-slate-700">${partner.orderHistory.map((item) => `<li>• ${item}</li>`).join('')}</ul>`;
      }
      if (appState.activePartnerTab === 'contact') {
        return `<ul class="space-y-2 text-sm text-slate-700">${partner.contactLog.map((item) => `<li>• ${item}</li>`).join('')}</ul>`;
      }
      if (appState.activePartnerTab === 'samples') {
        return `<ul class="space-y-2 text-sm text-slate-700">${partner.samples.map((item) => `<li>• ${item}</li>`).join('')}</ul>`;
      }
      if (appState.activePartnerTab === 'notes') {
        return `<p class="text-sm text-slate-700">${partner.notes}</p>`;
      }

      return `
        <p class="text-sm text-slate-700 mb-4">${partner.overview}</p>
        <div class="grid grid-cols-2 gap-3 text-sm">
          <div class="bg-slate-50 rounded-lg p-3"><p class="text-slate-500">Contact</p><p class="font-medium text-slate-800">${partner.contact}</p></div>
          <div class="bg-slate-50 rounded-lg p-3"><p class="text-slate-500">Email</p><p class="font-medium text-slate-800">${partner.email}</p></div>
          <div class="bg-slate-50 rounded-lg p-3"><p class="text-slate-500">Website</p><p class="font-medium text-slate-800">${partner.website}</p></div>
          <div class="bg-slate-50 rounded-lg p-3"><p class="text-slate-500">Next Action</p><p class="font-medium text-slate-800">${partner.nextAction}</p></div>
        </div>
      `;
    }

    function renderPartnersView() {
      const filteredPartners = getFilteredPartners();
      const selectedPartner = ensureSelectedPartner(filteredPartners);
      const countries = [...new Set(partnersData.map((partner) => partner.country))];
      const statuses = [...new Set(partnersData.map((partner) => partner.status))];
      const activeCount = partnersData.filter((partner) => partner.status === 'Active').length;
      const needsAction = partnersData.filter((partner) => partner.priority === 'High').length;

      return `
        <div class="space-y-6">
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white rounded-xl p-4 custom-shadow border border-slate-100"><p class="text-xs text-slate-500">Total Partners</p><p class="text-2xl font-bold text-slate-800 mt-1">${partnersData.length}</p></div>
            <div class="bg-white rounded-xl p-4 custom-shadow border border-slate-100"><p class="text-xs text-slate-500">Active</p><p class="text-2xl font-bold text-slate-800 mt-1">${activeCount}</p></div>
            <div class="bg-white rounded-xl p-4 custom-shadow border border-slate-100"><p class="text-xs text-slate-500">High Priority</p><p class="text-2xl font-bold text-slate-800 mt-1">${needsAction}</p></div>
            <div class="bg-white rounded-xl p-4 custom-shadow border border-slate-100"><p class="text-xs text-slate-500">Visible Rows</p><p class="text-2xl font-bold text-slate-800 mt-1">${filteredPartners.length}</p></div>
          </div>

          <div class="bg-white rounded-xl p-4 custom-shadow border border-slate-100 grid grid-cols-1 md:grid-cols-3 gap-3">
            <input id="partnerSearchInput" type="text" value="${appState.partnerSearch}" placeholder="Search company, country, contact..." class="w-full border border-slate-200 rounded-md text-sm" />
            <select id="partnerCountrySelect" class="w-full border border-slate-200 rounded-md text-sm">
              <option value="">All Countries</option>
              ${countries.map((country) => `<option value="${country}" ${appState.partnerCountry === country ? 'selected' : ''}>${country}</option>`).join('')}
            </select>
            <select id="partnerStatusSelect" class="w-full border border-slate-200 rounded-md text-sm">
              <option value="">All Status</option>
              ${statuses.map((status) => `<option value="${status}" ${appState.partnerStatus === status ? 'selected' : ''}>${status}</option>`).join('')}
            </select>
          </div>

          <div class="grid grid-cols-12 gap-6">
            <div class="col-span-12 lg:col-span-8 bg-white rounded-xl custom-shadow border border-slate-100 overflow-hidden">
              <table class="w-full text-sm">
                <thead class="bg-slate-50 text-slate-500">
                  <tr>
                    <th class="p-3 text-left">Company</th><th class="p-3 text-left">Country</th><th class="p-3 text-left">Contact</th>
                    <th class="p-3 text-left">Status</th><th class="p-3 text-left">Priority</th><th class="p-3 text-left">Last Contact</th>
                  </tr>
                </thead>
                <tbody>
                  ${filteredPartners.length ? filteredPartners.map((partner) => `
                    <tr data-partner-id="${partner.id}" class="partner-row border-t cursor-pointer ${partner.id === appState.selectedPartnerId ? 'bg-blue-50' : 'hover:bg-slate-50'}">
                      <td class="p-3"><p class="font-medium text-slate-800">${partner.company}</p><p class="text-xs text-slate-500">${partner.email}</p></td>
                      <td class="p-3">${partner.country}</td>
                      <td class="p-3">${partner.contact}</td>
                      <td class="p-3">${partner.status}</td>
                      <td class="p-3">${partner.priority}</td>
                      <td class="p-3">${partner.lastContact}</td>
                    </tr>
                  `).join('') : '<tr><td colspan="6" class="p-4 text-center text-slate-500">No partners found.</td></tr>'}
                </tbody>
              </table>
            </div>

            <div class="col-span-12 lg:col-span-4 bg-white rounded-xl p-4 custom-shadow border border-slate-100">
              <h3 class="text-sm font-semibold text-slate-800">${selectedPartner ? selectedPartner.company : 'Partner Detail'}</h3>
              <p class="text-xs text-slate-500 mb-3">${selectedPartner ? `${selectedPartner.country} · ${selectedPartner.status}` : 'No selection'}</p>
              <div class="flex flex-wrap gap-2 mb-4">
                ${['overview', 'orders', 'contact', 'samples', 'notes'].map((tab) => `
                  <button data-partner-tab="${tab}" class="partner-tab px-2 py-1 rounded-full text-xs ${appState.activePartnerTab === tab ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'}">${tab}</button>
                `).join('')}
              </div>
              <p class="text-xs text-slate-500 mb-2">Product Focus: ${selectedPartner ? selectedPartner.productFocus.join(', ') : '-'}</p>
              <p class="text-xs text-slate-500 mb-4">Next Action: ${selectedPartner ? selectedPartner.nextAction : '-'}</p>
              <div>${renderPartnerDetailBody(selectedPartner)}</div>
            </div>
          </div>
        </div>
      `;
    }

    const viewTemplates = {
      overview: () => `
        <div class="space-y-6">
          <div>
            <h1 class="text-2xl font-bold text-slate-800">Overview</h1>
            <p class="text-sm text-slate-400 mt-1">Command Center / Snapshot</p>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            ${['Open Deals', 'Pending Tasks', 'Partners Active', 'Revenue MTD'].map((item, i) => `
              <div class="bg-white rounded-xl p-5 custom-shadow border border-slate-100">
                <p class="text-sm text-slate-500">${item}</p>
                <p class="text-2xl font-bold text-slate-800 mt-2">${['18', '7', '12', '$84K'][i]}</p>
              </div>
            `).join('')}
          </div>
          <div class="bg-white rounded-xl p-6 custom-shadow border border-slate-100">
            <h3 class="font-semibold text-slate-800 mb-3">Weekly Focus</h3>
            <ul class="text-sm text-slate-600 space-y-2 list-disc pl-5">
              <li>Finalize 2 distributor quotes for UAE and Thailand.</li>
              <li>Collect sample feedback from 3 partner clinics.</li>
              <li>Review regulatory document checklist for new market onboarding.</li>
            </ul>
          </div>
        </div>
      `,
      partners: () => renderPartnersView(),
      deals: () => `
        <div class="space-y-6">
          <div><h1 class="text-2xl font-bold text-slate-800">Deals Pipeline</h1><p class="text-sm text-slate-400 mt-1">Pipeline / Active deals</p></div>
          <div class="bg-white rounded-xl p-6 custom-shadow border border-slate-100">
            <div class="grid grid-cols-4 gap-4 text-sm">
              <div class="p-3 bg-slate-50 rounded-lg"><p class="text-slate-500">Lead</p><p class="text-xl font-semibold text-slate-800">9</p></div>
              <div class="p-3 bg-slate-50 rounded-lg"><p class="text-slate-500">Contacted</p><p class="text-xl font-semibold text-slate-800">6</p></div>
              <div class="p-3 bg-slate-50 rounded-lg"><p class="text-slate-500">Negotiation</p><p class="text-xl font-semibold text-slate-800">3</p></div>
              <div class="p-3 bg-slate-50 rounded-lg"><p class="text-slate-500">Won</p><p class="text-xl font-semibold text-slate-800">4</p></div>
            </div>
          </div>
          <div class="bg-white rounded-xl custom-shadow border border-slate-100 overflow-hidden">
            <table class="w-full text-sm"><thead class="bg-slate-50 text-slate-500"><tr><th class="p-3 text-left">Company</th><th class="p-3 text-left">Country</th><th class="p-3 text-left">Stage</th><th class="p-3 text-left">Value</th></tr></thead><tbody>
            <tr class="border-t"><td class="p-3">KL Wellness</td><td class="p-3">Malaysia</td><td class="p-3">Negotiation</td><td class="p-3">$42,000</td></tr>
            <tr class="border-t"><td class="p-3">Dubai Derma</td><td class="p-3">UAE</td><td class="p-3">Contacted</td><td class="p-3">$58,000</td></tr>
            <tr class="border-t"><td class="p-3">Bangkok Clinic</td><td class="p-3">Thailand</td><td class="p-3">Lead</td><td class="p-3">$21,000</td></tr>
            </tbody></table>
          </div>
        </div>
      `,
      tasks: () => `
        <div class="space-y-6">
          <div><h1 class="text-2xl font-bold text-slate-800">Task Board</h1><p class="text-sm text-slate-400 mt-1">Tasks / Weekly execution</p></div>
          <div class="grid md:grid-cols-3 gap-4">
            ${['Today','This Week','Waiting'].map((col, idx) => `
              <div class="bg-white rounded-xl p-5 custom-shadow border border-slate-100">
                <h3 class="font-semibold text-slate-800 mb-3">${col}</h3>
                <ul class="space-y-2 text-sm text-slate-700">
                  <li>• ${[['Send NDA to partner','Check RF sample status'],['Prepare quote revision','Finalize distributor terms'],['Await legal review','Await sample result']][idx][0]}</li>
                  <li>• ${[['Follow-up with KL','Update pipeline notes'],['Book demo call','Update pricing sheet'],['Await PO confirmation','Await customs docs']][idx][1]}</li>
                </ul>
              </div>
            `).join('')}
          </div>
        </div>
      `,
      activity: () => `
        <div class="space-y-6">
          <div><h1 class="text-2xl font-bold text-slate-800">Activity Feed</h1><p class="text-sm text-slate-400 mt-1">Activity / Recent touchpoints</p></div>
          <div class="bg-white rounded-xl p-6 custom-shadow border border-slate-100 space-y-4 text-sm">
            <div class="border-b pb-3">10:45 AM · Email sent to Acme Solutions about updated quotation.</div>
            <div class="border-b pb-3">09:20 AM · Follow-up call logged with Dubai Derma.</div>
            <div class="border-b pb-3">Yesterday · Sample shipment status updated to in transit.</div>
            <div>Yesterday · New partner note added for Thailand clinic network.</div>
          </div>
        </div>
      `,
      documents: () => `
        <div class="space-y-6">
          <div><h1 class="text-2xl font-bold text-slate-800">Documents</h1><p class="text-sm text-slate-400 mt-1">Reports / Files and templates</p></div>
          <div class="bg-white rounded-xl custom-shadow border border-slate-100 overflow-hidden">
            <table class="w-full text-sm"><thead class="bg-slate-50"><tr><th class="p-3 text-left">Name</th><th class="p-3 text-left">Type</th><th class="p-3 text-left">Updated</th><th class="p-3 text-left">Owner</th></tr></thead><tbody>
              <tr class="border-t"><td class="p-3">Distributor Agreement v4</td><td class="p-3">PDF</td><td class="p-3">2026-04-21</td><td class="p-3">Jane</td></tr>
              <tr class="border-t"><td class="p-3">Pricing Sheet APAC</td><td class="p-3">XLSX</td><td class="p-3">2026-04-20</td><td class="p-3">Jane</td></tr>
              <tr class="border-t"><td class="p-3">Sample Request Form</td><td class="p-3">DOCX</td><td class="p-3">2026-04-18</td><td class="p-3">Ops</td></tr>
            </tbody></table>
          </div>
        </div>
      `
    };

    function renderCurrentView() {
      const viewRoot = document.getElementById('viewRoot');
      const template = viewTemplates[appState.currentView] || viewTemplates.overview;
      viewRoot.innerHTML = template();
      updateHeaderContext();
      updateSidebarActiveState();
      if (appState.currentView === 'partners') {
        setupPartnersViewInteractions();
      }
    }

    function updateHeaderContext() {
      const meta = viewMeta[appState.currentView] || viewMeta.overview;
      document.getElementById('headerTitle').textContent = meta.title;
      document.getElementById('headerSubtitle').textContent = meta.subtitle;
    }

    function updateSidebarActiveState() {
      const items = document.querySelectorAll('.sidebar-item');
      items.forEach((item) => {
        const isActive = item.dataset.view === appState.currentView;
        item.classList.toggle('bg-[#e0ebff]', isActive);
        item.classList.toggle('text-blue-700', isActive);
        item.classList.toggle('font-semibold', isActive);
        item.classList.toggle('text-slate-600', !isActive);
        item.classList.toggle('font-medium', !isActive);
      });
    }

    function setupViewRouter() {
      document.getElementById('sidebarNav').addEventListener('click', (event) => {
        const button = event.target.closest('[data-view]');
        if (!button) return;
        appState.currentView = button.dataset.view;
        if (appState.currentView !== 'partners') {
          appState.activePartnerTab = 'overview';
        }
        renderCurrentView();
      });
    }

    function setupPartnersViewInteractions() {
      const searchInput = document.getElementById('partnerSearchInput');
      const countrySelect = document.getElementById('partnerCountrySelect');
      const statusSelect = document.getElementById('partnerStatusSelect');

      if (searchInput) {
        searchInput.addEventListener('input', (event) => {
          appState.partnerSearch = event.target.value;
          renderCurrentView();
        });
      }

      if (countrySelect) {
        countrySelect.addEventListener('change', (event) => {
          appState.partnerCountry = event.target.value;
          renderCurrentView();
        });
      }

      if (statusSelect) {
        statusSelect.addEventListener('change', (event) => {
          appState.partnerStatus = event.target.value;
          renderCurrentView();
        });
      }

      document.querySelectorAll('.partner-row').forEach((row) => {
        row.addEventListener('click', () => {
          appState.selectedPartnerId = Number(row.dataset.partnerId);
          renderCurrentView();
        });
      });

      document.querySelectorAll('.partner-tab').forEach((tab) => {
        tab.addEventListener('click', () => {
          appState.activePartnerTab = tab.dataset.partnerTab;
          renderCurrentView();
        });
      });
    }

    function setupDraftingPanel() {
      const openBtn = document.getElementById('openDraftingTableBtn');
      const closeBtn = document.getElementById('closeDraftingTableBtn');
      const cancelBtn = document.getElementById('cancelDraftingBtn');
      const panel = document.getElementById('draftingPanel');
      const backdrop = document.getElementById('draftingBackdrop');
      const tabs = document.querySelectorAll('.draft-tab');
      const typeLabel = document.getElementById('draftTypeLabel');

      function openDraftingTable() {
        panel.classList.remove('translate-x-full');
        backdrop.classList.remove('hidden');
      }

      function closeDraftingTable() {
        panel.classList.add('translate-x-full');
        backdrop.classList.add('hidden');
      }

      openBtn.addEventListener('click', openDraftingTable);
      closeBtn.addEventListener('click', closeDraftingTable);
      cancelBtn.addEventListener('click', closeDraftingTable);
      backdrop.addEventListener('click', closeDraftingTable);

      tabs.forEach((tab) => {
        tab.addEventListener('click', () => {
          tabs.forEach((btn) => {
            btn.classList.remove('bg-blue-600', 'text-white');
            btn.classList.add('bg-slate-100', 'text-slate-600');
          });

          tab.classList.remove('bg-slate-100', 'text-slate-600');
          tab.classList.add('bg-blue-600', 'text-white');

          const map = {
            note: 'Writing: Note',
            task: 'Writing: Task',
            call: 'Writing: Call Log',
            follow: 'Writing: Follow-up'
          };

          typeLabel.textContent = map[tab.dataset.type] || 'Writing: Note';
        });
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      setupViewRouter();
      setupDraftingPanel();
      renderCurrentView();
    });
  </script>
</body>
</html>
